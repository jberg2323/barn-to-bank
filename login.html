<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>Barn to Bank — Staff Login</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230f1f17'/%3E%3Ctext x='16' y='21' text-anchor='middle' fill='%23d6b061' font-family='Georgia' font-size='14' font-style='italic'%3EB%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#142a1f;
    --card:#1e3b2c;
    --ink:#f4eddf;
    --muted:rgba(244,237,223,.68);
    --brass:#d6b061;
    --line:rgba(244,237,223,.16);
  }
  *{box-sizing:border-box;}
  html,body{min-height:100%;margin:0;}
  body{
    font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:radial-gradient(1200px 600px at 10% -10%, rgba(214,176,97,.12), transparent 55%),
               radial-gradient(900px 500px at 100% 100%, rgba(114,168,120,.08), transparent 50%),
               var(--bg);
    color:var(--ink);
    display:flex;align-items:center;justify-content:center;
    padding:max(24px, env(safe-area-inset-top)) max(24px, env(safe-area-inset-right)) max(24px, env(safe-area-inset-bottom)) max(24px, env(safe-area-inset-left));
  }
  .panel{
    width:min(420px, 100%);
    background:linear-gradient(165deg, rgba(214,176,97,.08), rgba(30,59,44,.95));
    border:1px solid var(--line);
    border-radius:10px;
    padding:2rem 1.8rem 1.7rem;
    box-shadow:0 24px 60px -30px rgba(0,0,0,.55);
  }
  .brand{
    font-family:"Fraunces",Georgia,serif;
    font-size:1.65rem;font-weight:600;margin:0 0 .35rem;
  }
  .brand em{color:var(--brass);font-style:italic;}
  .sub{font-size:.92rem;color:var(--muted);margin:0 0 1.6rem;line-height:1.55;}
  label{
    display:block;font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;
    color:var(--muted);font-weight:600;margin-bottom:.45rem;
  }
  input{
    width:100%;font:inherit;font-size:16px;
    background:rgba(244,237,223,.06);border:1px solid var(--line);border-radius:4px;
    color:var(--ink);padding:.85em 1em;margin-bottom:1rem;
    -webkit-appearance:none;appearance:none;
  }
  input:focus{outline:2px solid var(--brass);outline-offset:2px;border-color:var(--brass);}
  button{
    width:100%;font:inherit;font-weight:600;font-size:.82rem;letter-spacing:.12em;text-transform:uppercase;
    background:var(--brass);color:#1c241d;border:0;border-radius:4px;
    padding:1em 1.2em;cursor:pointer;min-height:48px;touch-action:manipulation;
  }
  button:disabled{opacity:.65;cursor:wait;}
  .error{
    display:none;margin-top:.9rem;padding:.85rem 1rem;border-radius:4px;
    background:rgba(180,60,60,.18);border:1px solid rgba(220,100,100,.35);
    color:#ffc9c9;font-size:.88rem;
  }
  .back{
    display:inline-block;margin-top:1.2rem;font-size:.82rem;color:var(--muted);
    text-decoration:none;
  }
  .back:hover{color:var(--brass);}
</style>
</head>
<body>
  <main class="panel">
    <h1 class="brand">Barn <em>to</em> Bank</h1>
    <p class="sub">Origination platform — staff access only.</p>
    <form id="loginForm">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required>
      <button type="submit" id="submitBtn">Enter Platform</button>
      <p class="error" id="errorMsg">Invalid password. Try again.</p>
    </form>
    <a class="back" href="/">← Back to public site</a>
  </main>
  <script>
    const params = new URLSearchParams(window.location.search);
    const next = params.get('next') || '/app';
    const safeNext = next.startsWith('/') && !next.startsWith('//') ? next : '/app';

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const err = document.getElementById('errorMsg');
      const password = document.getElementById('password').value;
      btn.disabled = true;
      err.style.display = 'none';
      try {
        const res = await fetch('/api/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password }),
          credentials: 'same-origin',
        });
        const data = await res.json();
        if (!res.ok || !data.ok) throw new Error(data.error || 'Login failed');
        window.location.replace(safeNext);
      } catch {
        err.style.display = 'block';
        btn.disabled = false;
        document.getElementById('password').focus();
      }
    });
  </script>
</body>
</html>
